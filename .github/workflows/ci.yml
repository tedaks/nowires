name: CI

on:
  push:
    branches: [main, frontend]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [eslint, typecheck]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  ruff:
    name: Python lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  pytest:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -v --tb=short tests/

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, pytest]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
      - name: Install Python deps
        run: pip install -r ../api/requirements.txt
        working-directory: apps/api
      - name: Start backend
        run: |
          cd ../api
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          npx wait-on http://127.0.0.1:8000/api/p2p --timeout 30000 --httpMethod POST || true
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run build
      - name: Start frontend
        run: npx next start -p 3000 &
      - name: Wait for frontend
        run: npx wait-on http://localhost:3000 --timeout 30000
      - run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7